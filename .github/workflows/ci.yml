name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Agent smoke tests
        run: npm run test:agents

      - name: Build
        run: npm run build
        env:
          # Auth.js requires a secret at build for some paths; dummy is fine for CI
          AUTH_SECRET: ci-build-secret-not-for-production
          AUTH_URL: http://localhost:3020
